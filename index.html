<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaming Panel</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
height:100vh;
overflow:hidden;
color:white;
}

.bg{
position:absolute;
width:100%;
height:100%;
background:url("https://images.unsplash.com/photo-1605901309584-818e25960a8f") center/cover no-repeat;
filter:brightness(0.3);
}

.overlay{
position:absolute;
width:100%;
height:100%;
backdrop-filter:blur(6px);
background:rgba(0,0,0,0.4);
}

.topbar{
position:relative;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
}

.logo{
font-size:22px;
font-weight:bold;
letter-spacing:2px;
}

.menu{
display:flex;
gap:20px;
}

.menu div{
padding:10px 15px;
background:rgba(255,255,255,0.08);
border-radius:12px;
cursor:pointer;
transition:0.3s;
}

.menu div:hover{
transform:scale(1.1);
background:rgba(59,130,246,0.4);
box-shadow:0 0 20px #3b82f6;
}

.hero{
text-align:center;
margin-top:120px;
}

.hero h1{
font-size:60px;
text-shadow:0 0 20px #3b82f6;
}

.hero p{
margin-top:10px;
color:#cbd5e1;
}

.cards{
display:flex;
justify-content:center;
gap:20px;
margin-top:60px;
flex-wrap:wrap;
}

.card{
width:250px;
padding:20px;
border-radius:15px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,0.1);
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 30px rgba(59,130,246,0.5);
}

.card h3{
margin-bottom:10px;
}

.btn{
margin-top:10px;
padding:10px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
cursor:pointer;
width:100%;
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="topbar">
<div class="logo">🎮 FIVE M PANEL</div>

<div class="menu">
<div>🏠 Home</div>
<div>🎁 Cases</div>
<div>💼 Inventory</div>
<div>⚙️ Admin</div>
</div>
</div>

<div class="hero">
<h1>🔥 PREMIUM GAME PANEL</h1>
<p>Modern UI • Animasyonlu Menü • 4K Görünüm</p>

<div class="cards">

<div class="card">
<h3>🎁 Kasa Sistemi</h3>
<p>CS2 tarzı case opening</p>
<button class="btn">Aç</button>
</div>

<div class="card">
<h3>💰 Coin Sistemi</h3>
<p>Admin coin verebilir</p>
<button class="btn">Görüntüle</button>
</div>

<div class="card">
<h3>👤 Kullanıcı Paneli</h3>
<p>Profil ve envanter</p>
<button class="btn">Git</button>
</div>

</div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Case Opening Pro</title>

<style>
body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at top, #1e293b, #0f172a);
color:white;
overflow-x:hidden;
}

header{
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(0,0,0,0.3);
backdrop-filter:blur(10px);
}

.logo{
font-size:22px;
font-weight:bold;
}

.coin{
background:#111827;
padding:10px 20px;
border-radius:12px;
}

.container{
text-align:center;
padding:40px;
}

.case-grid{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-top:30px;
}

.case-card{
width:200px;
padding:20px;
border-radius:15px;
background:linear-gradient(145deg,#1f2937,#111827);
box-shadow:0 0 20px rgba(0,0,0,0.5);
cursor:pointer;
transition:0.3s;
}

.case-card:hover{
transform:scale(1.08);
box-shadow:0 0 30px #3b82f6;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
cursor:pointer;
}

#spinBox{
margin-top:40px;
font-size:28px;
height:60px;
overflow:hidden;
border:2px solid #3b82f6;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
}

.spin{
animation:spin 0.1s infinite;
}

@keyframes spin{
0%{transform:translateY(0)}
100%{transform:translateY(-10px)}
}

.result{
margin-top:20px;
font-size:26px;
color:#22c55e;
}

.rare{color:#f59e0b}
.epic{color:#a855f7}
.legendary{color:#ef4444}

</style>
</head>

<body>

<header>
<div class="logo">🎮 CASE OPENING 4K</div>
<div class="coin">💰 1000 Coin</div>
</header>

<div class="container">

<h1>🔥 KASA AÇ 🔥</h1>

<div class="case-grid">

<div class="case-card">
<h3>Normal Case</h3>
<p>💎 Basit Skinler</p>
<button onclick="openCase('normal')">Aç (100)</button>
</div>

<div class="case-card">
<h3>Epic Case</h3>
<p>🔥 Orta Skinler</p>
<button onclick="openCase('epic')">Aç (300)</button>
</div>

<div class="case-card">
<h3>Legend Case</h3>
<p>👑 Efsane Skinler</p>
<button onclick="openCase('legend')">Aç (500)</button>
</div>

</div>

<div id="spinBox">🎰 Bekleniyor...</div>

<div class="result" id="result"></div>

</div>

<script>

let coin = 1000;

const cases = {
normal:[
{n:"USP-S | Blue",r:"common"},
{n:"AK-47 | Redline",r:"rare"},
{n:"AWP | Asiimov",r:"epic"}
],
epic:[
{n:"M4A1-S | Printstream",r:"epic"},
{n:"AK-47 | Neon",r:"epic"},
{n:"Butterfly Knife",r:"legendary"}
],
legend:[
{n:"Dragon Lore",r:"legendary"},
{n:"Karambit Fade",r:"legendary"},
{n:"AWP Gungnir",r:"legendary"}
]
};

function openCase(type){

let price = type==="normal"?100:type==="epic"?300:500;

if(coin < price){
alert("Yetersiz coin!");
return;
}

coin -= price;

let items = cases[type];

let spinBox = document.getElementById("spinBox");
let result = document.getElementById("result");

let i = 0;

let interval = setInterval(()=>{
spinBox.innerText = items[i%items.length].n;
i++;
},80);

setTimeout(()=>{
clearInterval(interval);

let won = items[Math.floor(Math.random()*items.length)];

spinBox.innerText = "🎉 " + won.n;

result.innerHTML = "Kazandın: <b class='"+won.r+"'>"+won.n+"</b>";

},2500);

}

</script>

</body>
</html>

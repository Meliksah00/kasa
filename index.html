<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0b0f1a;
color:white;
display:flex;
height:100vh;
}

/* SIDEBAR */
.sidebar{
width:250px;
background:#0f172a;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
}

.logo{
font-size:20px;
font-weight:bold;
margin-bottom:20px;
}

.menu{
padding:12px;
border-radius:10px;
cursor:pointer;
background:rgba(255,255,255,0.05);
transition:0.2s;
}

.menu:hover{
background:#1d4ed8;
}

/* MAIN */
.main{
flex:1;
display:flex;
flex-direction:column;
}

/* TOP BAR */
.topbar{
height:60px;
background:#0f172a;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.balance{
background:#1e293b;
padding:8px 15px;
border-radius:10px;
}

/* CONTENT */
.content{
flex:1;
padding:20px;
overflow:auto;
}

/* CARDS */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
}

.card{
background:#111827;
padding:15px;
border-radius:12px;
transition:0.2s;
cursor:pointer;
}

.card:hover{
transform:translateY(-5px);
background:#1f2937;
}

/* INVENTORY */
.item{
background:#111827;
padding:10px;
border-radius:10px;
margin-top:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
padding:5px 10px;
border:none;
border-radius:8px;
cursor:pointer;
background:#3b82f6;
color:white;
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<div class="logo">🎮 CS PANEL</div>

<div class="menu" onclick="show('cases')">🎁 Kasalar</div>
<div class="menu" onclick="show('inv')">💼 Envanter</div>
<div class="menu" onclick="show('admin')">⚙️ Admin</div>
</div>

<!-- MAIN -->
<div class="main">

<!-- TOP -->
<div class="topbar">
<div>🔥 CS2 Case System</div>
<div class="balance">💰 <span id="coin">1000</span></div>
</div>

<!-- CONTENT -->
<div class="content">

<!-- CASES -->
<div id="cases">
<h2>Kasalar</h2>

<div class="grid">
<div class="card" onclick="openCase(100)">Normal Case - 100$</div>
<div class="card" onclick="openCase(300)">Epic Case - 300$</div>
<div class="card" onclick="openCase(500)">Legend Case - 500$</div>
</div>

<div id="result" style="margin-top:20px"></div>
</div>

<!-- INVENTORY -->
<div id="inv" style="display:none">
<h2>Envanter</h2>
<div id="invList"></div>
</div>

<!-- ADMIN -->
<div id="admin" style="display:none">
<h2>Admin Panel</h2>
<button onclick="addCoin()">Coin Ver</button>
</div>

</div>
</div>

<script>

let coin = 1000;
let inv = [];

function show(page){
document.getElementById("cases").style.display="none";
document.getElementById("inv").style.display="none";
document.getElementById("admin").style.display="none";

document.getElementById(page).style.display="block";
}

/* CASE OPEN */
function openCase(price){

if(coin < price){
alert("Yetersiz coin");
return;
}

coin -= price;
document.getElementById("coin").innerText = coin;

let items = [
{n:"AK-47 Redline",v:50},
{n:"AWP Asiimov",v:120},
{n:"Karambit Fade",v:500}
];

let roll = setInterval(()=>{
document.getElementById("result").innerText =
items[Math.floor(Math.random()*items.length)].n;
},80);

setTimeout(()=>{
clearInterval(roll);

let won = items[Math.floor(Math.random()*items.length)];

document.getElementById("result").innerText = "Kazandın: " + won.n;

inv.push(won);
},2000);

}

/* INVENTORY */
function loadInv(){
let box = document.getElementById("invList");
box.innerHTML="";

inv.forEach((i,idx)=>{
let div = document.createElement("div");
div.className="item";

div.innerHTML=`
<div>${i.n} - $${i.v}</div>
<button onclick="sell(${idx})">Sat</button>
`;

box.appendChild(div);
});
}

function sell(i){
coin += inv[i].v;
inv.splice(i,1);
document.getElementById("coin").innerText=coin;
loadInv();
}

/* ADMIN */
function addCoin(){
let a = prompt("Coin:");
coin += Number(a);
document.getElementById("coin").innerText=coin;
}

setInterval(loadInv,1000);

</script>

</body>
</html>

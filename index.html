<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS Case System</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
height:100vh;
overflow:hidden;
}

/* CS2 BACKGROUND */
.bg{
position:absolute;
width:100%;
height:100%;
background:url("https://cdn.cloudflare.steamstatic.com/steam/apps/730/ss_0b3d4d1c7b0f5c3d6f1d2.jpg") center/cover no-repeat;
filter:brightness(0.35);
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(90deg,rgba(0,0,0,0.85) 40%,rgba(0,0,0,0.2));
}

.container{
position:relative;
display:flex;
height:100vh;
color:white;
}

/* LOGIN */
.left{
width:40%;
display:flex;
align-items:center;
justify-content:center;
}

.panel{
width:320px;
padding:25px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
border-radius:15px;
border:1px solid rgba(255,255,255,0.1);
}

input{
width:100%;
padding:10px;
margin:6px 0;
border:none;
border-radius:8px;
background:rgba(255,255,255,0.1);
color:white;
}

button{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
cursor:pointer;
}

/* RIGHT */
.right{
width:60%;
padding:40px;
}

.title{
font-size:50px;
font-weight:bold;
text-shadow:0 0 20px #3b82f6;
}

/* CASE ROULETTE */
#roulette{
margin-top:25px;
height:90px;
border:2px solid #3b82f6;
border-radius:10px;
overflow:hidden;
display:flex;
align-items:center;
justify-content:center;
position:relative;
}

.scroll{
display:flex;
gap:10px;
position:absolute;
left:0;
transition:transform 0.08s linear;
}

.itemBox{
min-width:120px;
height:70px;
background:rgba(255,255,255,0.08);
border-radius:10px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
font-size:12px;
}

/* INVENTORY */
.inv{
margin-top:20px;
display:flex;
flex-wrap:wrap;
gap:10px;
}

.item{
width:160px;
background:rgba(255,255,255,0.08);
padding:10px;
border-radius:10px;
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="container">

<!-- LOGIN -->
<div class="left" id="login">
<div class="panel">
<h2>🔐 LOGIN</h2>
<input id="u" placeholder="Kullanıcı">
<input id="p" placeholder="Şifre">
<button onclick="login()">Giriş</button>
<button onclick="register()" style="background:#22c55e">Kayıt</button>
</div>
</div>

<!-- GAME -->
<div class="right" id="game">

<div class="title">🔥 CS CASE SYSTEM</div>

<h3>💰 Coin: <span id="coin">0</span></h3>

<div id="admin" style="display:none;background:red;padding:10px;border-radius:10px;cursor:pointer;width:200px;margin-top:10px" onclick="giveCoin()">
ADMIN PANEL
</div>

<div>
<button onclick="openCase(100)">Normal Case</button>
<button onclick="openCase(300)">Epic Case</button>
</div>

<!-- CS STYLE ROULETTE -->
<div id="roulette">
<div class="scroll" id="scroll"></div>
</div>

<h3>ENVANTER</h3>
<div class="inv" id="inv"></div>

</div>

</div>

<script>

let users = JSON.parse(localStorage.getItem("users")||"{}");
let current = null;

const items = [
{name:"AK-47 Redline",img:"https://steamcdn-a.akamaihd.net/apps/730/icons/econ/default_generated/weapon_ak47.png",value:50},
{name:"AWP Asiimov",img:"https://steamcdn-a.akamaihd.net/apps/730/icons/econ/default_generated/weapon_awp.png",value:120},
{name:"M4A1-S Printstream",img:"https://steamcdn-a.akamaihd.net/apps/730/icons/econ/default_generated/weapon_m4a1_silencer.png",value:200},
{name:"Karambit Fade",img:"https://steamcdn-a.akamaihd.net/apps/730/icons/econ/default_generated/weapon_knife_karambit.png",value:500}
];

function register(){
let u=uVal();
let p=pVal();
users[u]={pass:p,coin:500,inv:[]};
save();
}

function login(){
let u=uVal();
let p=pVal();

if(!users[u]||users[u].pass!=p)return alert("Hata");

current=u;

document.getElementById("login").style.display="none";
document.getElementById("game").style.display="block";

if(u=="admin"&&p=="admin"){
document.getElementById("admin").style.display="block";
}

update();
}

function openCase(price){

let u=users[current];
if(u.coin<price)return alert("Yetersiz");

u.coin-=price;

let scroll=document.getElementById("scroll");
scroll.innerHTML="";

let loopItems=[];

// CS STYLE BAR
for(let i=0;i<30;i++){
let it=items[Math.floor(Math.random()*items.length)];
loopItems.push(it);

scroll.innerHTML+=`
<div class="itemBox">
${it.name}
</div>
`;
}

let pos=0;
let interval=setInterval(()=>{
pos-=10;
scroll.style.transform=`translateX(${pos}px)`;
},50);

setTimeout(()=>{
clearInterval(interval);

let won=loopItems[Math.floor(Math.random()*loopItems.length)];
alert("Kazandın: "+won.name);

u.inv.push(won);
update();

},3000);

}

function update(){

let u=users[current];
document.getElementById("coin").innerText=u.coin;

let inv=document.getElementById("inv");
inv.innerHTML="";

u.inv.forEach((i,idx)=>{
let div=document.createElement("div");
div.className="item";

div.innerHTML=`
<b>${i.name}</b><br>
💰 $${i.value}<br>
<button onclick="sell(${idx})">Sat</button>
<button onclick="keep()">Envanterde Tut</button>
`;

inv.appendChild(div);
});

save();
}

function sell(i){
let u=users[current];
u.coin+=u.inv[i].value;
u.inv.splice(i,1);
update();
}

function keep(){
alert("Zaten envanterde 👍");
}

function giveCoin(){
let a=prompt("Coin:");
users[current].coin+=Number(a);
update();
}

function uVal(){return document.getElementById("u").value}
function pVal(){return document.getElementById("p").value}

function save(){
localStorage.setItem("users",JSON.stringify(users));
}

</script>

</body>
</html>

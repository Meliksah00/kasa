<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS Case System</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
height:100vh;
overflow:hidden;
}

.bg{
position:absolute;
width:100%;
height:100%;
background:url("https://images.unsplash.com/photo-1605901309584-818e25960a8f") center/cover no-repeat;
filter:brightness(0.3);
}

.overlay{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(90deg,rgba(0,0,0,0.85) 40%,rgba(0,0,0,0.2));
}

.container{
position:relative;
display:flex;
height:100vh;
color:white;
}

/* LOGIN */
.left{
width:40%;
display:flex;
align-items:center;
justify-content:center;
}

.panel{
width:320px;
padding:25px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(12px);
border-radius:15px;
border:1px solid rgba(255,255,255,0.1);
}

input{
width:100%;
padding:10px;
margin:6px 0;
border:none;
border-radius:8px;
background:rgba(255,255,255,0.1);
color:white;
}

button{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:10px;
background:#3b82f6;
color:white;
cursor:pointer;
}

/* RIGHT */
.right{
width:60%;
padding:40px;
}

.title{
font-size:50px;
font-weight:bold;
text-shadow:0 0 20px #3b82f6;
}

.menu{
margin-top:20px;
display:flex;
gap:10px;
}

.card{
background:rgba(255,255,255,0.08);
padding:15px;
border-radius:12px;
cursor:pointer;
}

#game{
display:none;
}

.caseArea{
display:flex;
gap:10px;
margin-top:20px;
flex-wrap:wrap;
}

.case{
background:rgba(255,255,255,0.08);
padding:15px;
width:180px;
border-radius:10px;
}

#roulette{
margin-top:20px;
height:60px;
border:2px solid #3b82f6;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
font-size:18px;
}

.inv{
margin-top:20px;
display:flex;
flex-wrap:wrap;
gap:10px;
}

.item{
width:160px;
background:rgba(255,255,255,0.08);
padding:10px;
border-radius:10px;
}

.small{font-size:12px;color:#aaa}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="container">

<!-- LOGIN -->
<div class="left" id="login">
<div class="panel">
<h2>🔐 LOGIN</h2>
<input id="u" placeholder="Kullanıcı">
<input id="p" placeholder="Şifre">
<button onclick="login()">Giriş</button>
<button onclick="register()" style="background:#22c55e">Kayıt Ol</button>
</div>
</div>

<!-- GAME -->
<div class="right" id="game">

<div class="title">🔥 CS CASE SYSTEM</div>

<h3>💰 Coin: <span id="coin">0</span></h3>

<div id="admin" style="display:none;background:red;padding:10px;border-radius:10px;cursor:pointer;width:200px;margin-top:10px" onclick="giveCoin()">
ADMIN PANEL
</div>

<div class="caseArea">
<div class="case">
Normal Case (100$)
<button onclick="openCase(100)">Aç</button>
</div>

<div class="case">
Epic Case (300$)
<button onclick="openCase(300)">Aç</button>
</div>
</div>

<div id="roulette">🎰 Bekleniyor...</div>

<h3>ENVANTER</h3>
<div class="inv" id="inv"></div>

</div>

</div>

<script>

let users = JSON.parse(localStorage.getItem("users")||"{}");
let current = null;

const items = [
{name:"AK-47 Redline",img:"https://steamcdn-a.akamaihd.net/apps/730/icons/econ/default_generated/weapon_ak47_a_light_blue.png",value:50},
{name:"AWP Asiimov",img:"https://steamcdn-a.akamaihd.net/apps/730/icons/econ/default_generated/weapon_awp_cu_awp_asimov_light.png",value:120},
{name:"M4A1-S Printstream",img:"https://steamcdn-a.akamaihd.net/apps/730/icons/econ/default_generated/weapon_m4a1_silencer_printstream.png",value:200},
{name:"Karambit Fade",img:"https://steamcdn-a.akamaihd.net/apps/730/icons/econ/default_generated/weapon_karambit_fade.png",value:500}
];

function register(){
let u=document.getElementById("u").value;
let p=document.getElementById("p").value;

users[u]={pass:p,coin:500,inv:[]};
localStorage.setItem("users",JSON.stringify(users));
alert("Kayıt başarılı");
}

function login(){
let u=document.getElementById("u").value;
let p=document.getElementById("p").value;

if(!users[u]||users[u].pass!=p)return alert("Hata");

current=u;

document.getElementById("login").style.display="none";
document.getElementById("game").style.display="block";

if(u=="admin"&&p=="admin"){
document.getElementById("admin").style.display="block";
}

update();
}

function openCase(price){

let u=users[current];
if(u.coin<price)return alert("Yetersiz");

u.coin-=price;

let i=0;
let interval=setInterval(()=>{
document.getElementById("roulette").innerText=items[i%items.length].name;
i++;
},80);

setTimeout(()=>{
clearInterval(interval);
let w=items[Math.floor(Math.random()*items.length)];
document.getElementById("roulette").innerText="🎉 "+w.name;
u.inv.push(w);
update();
},2000);

}

function update(){

let u=users[current];

document.getElementById("coin").innerText=u.coin;

let inv=document.getElementById("inv");
inv.innerHTML="";

u.inv.forEach((i,idx)=>{
let div=document.createElement("div");
div.className="item";
div.innerHTML=`
<img src="${i.img}" width="100"><br>
<b>${i.name}</b><br>
💰 $${i.value}<br>
<button onclick="sell(${idx})">Sat</button>
`;
inv.appendChild(div);
});

localStorage.setItem("users",JSON.stringify(users));
}

function sell(i){
let u=users[current];
u.coin+=u.inv[i].value;
u.inv.splice(i,1);
update();
}

function giveCoin(){
let a=prompt("Coin:");
users[current].coin+=Number(a);
update();
}

</script>

</body>
</html>
